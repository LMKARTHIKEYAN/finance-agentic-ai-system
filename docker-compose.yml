services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finance-agentic-ai-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_agentic_ai

    ports:
      - "5432:5432"

    volumes:
      - finance_pgdata:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d finance_agentic_ai",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finance_pgdata: